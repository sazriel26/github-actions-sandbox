name: Delete Git branch of closed Pull Requests

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  delete_branch:
    runs-on: ubuntu-latest
    if: ${{ github.head_ref }}
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}

    - run: |
        git push -d origin ${{ github.head_ref }}

