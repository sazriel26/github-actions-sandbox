name: Homebrew TAP INFO (Workflow)

on:
  workflow_call:
    inputs:
      forced:
        description: "Force execution - Default: false"
        required: false
        type: boolean
        default: false
      github_actions_artifact_name:
        description: "Artifact name for tap information - Default: homebrew-tap-info-json"
        required: false
        type: string
        default: "homebrew-tap-info-json"

jobs:
  get_artifact_sha:
    runs-on: ubuntu-latest

    outputs:
      ref: ${{ steps.get-ref.outputs.ref }}

    if: ${{ ! inputs.forced }}
    steps:
      - id: download-artifacts
        continue-on-error: true
        run: |
          gh run download -n ${{ inputs.github_actions_artifact_name }}
        env:
          GH_TOKEN: ${{ github.token }}

      - id: get-ref
        run: |
          if [[ -e ${{ inputs.github_actions_artifact_name }} ]]; then
            echo ref=$(jq -r '.[0]."HEAD"' ${{ inputs.github_actions_artifact_name }})
          else
            echo ref=
          fi >> $GITHUB_OUTPUT

  check_freshness:
    runs-on: ubuntu-latest
    needs: [ get_artifact_sha ]

    outputs:
      go-ahead: ${{ steps.check.outputs.yesno }}

    if: ${{ ! inputs.forced }}
    steps:
      - id: check
        run: |
          if [[ "${{ needs.get_artifact_sha.outputs.ref }}" != "${{ github.sha }}" ]]; then
            echo yesno=1
          else
            echo yesno=0
          fi >> $GITHUB_OUTPUT

  homebrew_tap_info:
    runs-on: ubuntu-latest
    needs: check_freshness

    env:
      HOMEBREW_NO_ANALYTICS: 1

    outputs:
      homebrew-tap-info-json: ${{ steps.echo.outputs.json }}

    if: ${{ inputs.forced || needs.check_freshness.outputs.go-ahead }}
    steps:
     - id: setup-homebrew
       uses: sazriel26/github-actions-sandbox/setup-homebrew-on-github-actions@main
       with:
         developer-mode: true

     - id: homebrew-tap
       run: |
         brew tap ${{ github.repository }}

     - id: homebrew-tap-info-json
       run: |
         brew tap-info --json ${{ github.repository }} \
           > ${{ inputs.github_actions_artifact_name }}

     - id: upload-artifacts
       uses: actions/upload-artifact@v4
       with:
         name: ${{ inputs.github_actions_artifact_name }}
         path: ${{ inputs.github_actions_artifact_name }}
         overwrite: true

     - id: echo 
       run: |
          json=$(< ${{ inputs.github_actions_artifact_name }})
          echo json=${json} >> $GITHUB_OUTPUT

# EoF
