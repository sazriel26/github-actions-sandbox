# [https://github.com/orgs/community/discussions/27154#discussioncomment-3254845]
name: Dump github context

on:
  workflow_call:

jobs:
  dump_github_context:
    - id: dump_github
      if: github
      runs-on: ubuntu-latest
      steps:
        - run: echo "$GITHUB_CONTEXT"
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}

# EoF
